services:
  minio:
    image: minio/minio:latest
    container_name: donclaw-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: donclaw
      MINIO_ROOT_PASSWORD: donclaw123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
